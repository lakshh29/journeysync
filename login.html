<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In/Sign Up - Public Transit App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f2f5;
      margin: 0;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .left-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      max-width: 50%;
    }

    .left-section img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .right-section {
      flex: 1;
      background-color: #ffffff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 450px;
      width: 100%;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .btn-primary {
      background-color: #28a745;
      border: none;
      transition: background-color 0.3s;
    }

    .btn-primary:hover {
      background-color: #218838;
    }

    .form-text {
      font-size: 0.9rem;
      text-align: center;
      margin-top: 20px;
    }

    .form-text a {
      color: #007bff;
      text-decoration: none;
    }

    .form-text a:hover {
      text-decoration: underline;
    }

    .nav-tabs .nav-link {
      color: #007bff;
    }

    .nav-tabs .nav-link.active {
      background-color: #28a745;
      color: white;
    }

    @media (max-width: 768px) {
      .left-section {
        display: none;
      }

      .right-section {
        width: 100%;
        padding: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .btn {
        font-size: 0.9rem;
      }
    }

    .alert {
      font-size: 1rem;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-section">
      <img src="https://i.postimg.cc/Kz3cNd0q/Screenshot-2025-01-08-224447.png" alt="Public Transit App Interface Preview">
    </div>

    <div class="right-section">
      <!-- Navigation Tabs for Sign In/Sign Up -->
      <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="sign-in-tab" data-bs-toggle="tab" data-bs-target="#sign-in" type="button" role="tab">Sign In</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="sign-up-tab" data-bs-toggle="tab" data-bs-target="#sign-up" type="button" role="tab">Sign Up</button>
        </li>
      </ul>

      <!-- Feedback Message -->
      <div id="feedback" class="alert" role="alert"></div>

      <div class="tab-content" id="authTabsContent">
        <!-- Sign In Form -->
        <div class="tab-pane fade show active" id="sign-in" role="tabpanel">
          <h1>Sign in to continue</h1>
          <form id="signInForm">
            <div class="mb-3">
              <label for="signInUsernameOrEmail" class="form-label">Username or Email</label>
              <input type="text" class="form-control" id="signInUsernameOrEmail" placeholder="Enter your username or email" required>
            </div>
            <div class="mb-3">
              <label for="signInPassword" class="form-label">Password</label>
              <input type="password" class="form-control" id="signInPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
            <div class="form-text">
              <a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot your password?</a>
            </div>
          </form>
        </div>

        <!-- Sign Up Form -->
        <div class="tab-pane fade" id="sign-up" role="tabpanel">
          <h1>Create a new account</h1>
          <form id="signUpForm">
            <div class="mb-3">
              <label for="signUpUsername" class="form-label">Username</label>
              <input type="text" class="form-control" id="signUpUsername" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
              <label for="signUpEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="signUpEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label for="signUpPassword" class="form-label">Password</label>
              <input type="password" class="form-control" id="signUpPassword" placeholder="Choose a password" required>
            </div>
            <div class="mb-3">
              <label for="signUpConfirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="signUpConfirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="forgotPasswordModalLabel">Forgot Your Password?</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label for="resetEmail" class="form-label">Enter your email</label>
              <input type="email" class="form-control" id="resetEmail" placeholder="Enter your registered email" required>
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Sign In Form Handler
    document.getElementById("signInForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const usernameOrEmail = document.getElementById("signInUsernameOrEmail").value;
      const password = document.getElementById("signInPassword").value;

      try {
        const response = await fetch("http://localhost:5000/signin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ usernameOrEmail, password }),
        });

        const result = await response.json();

        const feedback = document.getElementById("feedback");
        feedback.style.display = "block";
        feedback.classList.remove("alert-success", "alert-danger");

        if (result.success) {
          feedback.classList.add("alert-success");
          feedback.textContent = result.message;

          // Redirect to bus.html after 1 second
          setTimeout(() => {
            window.location.href = "busfinal.html";
          }, 1000);
        } else {
          feedback.classList.add("alert-danger");
          feedback.textContent = result.message;
        }
      } catch (err) {
        console.error("Error:", err);
      }
    });

    // Sign Up Form Handler
    document.getElementById("signUpForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const username = document.getElementById("signUpUsername").value;
      const email = document.getElementById("signUpEmail").value;
      const password = document.getElementById("signUpPassword").value;
      const confirmPassword = document.getElementById("signUpConfirmPassword").value;

      try {
        const response = await fetch("http://localhost:5000/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ username, email, password, confirmPassword }),
        });

        const result = await response.json();

        const feedback = document.getElementById("feedback");
        feedback.style.display = "block";
        feedback.classList.remove("alert-success", "alert-danger");

        if (result.success) {
          feedback.classList.add("alert-success");
          feedback.textContent = result.message;

          // Automatically switch to the "Sign In" tab
          const signInTab = new bootstrap.Tab(document.getElementById("sign-in-tab"));
          signInTab.show();

          // Optionally clear the "Sign Up" form fields
          document.getElementById("signUpForm").reset();
        } else {
          feedback.classList.add("alert-danger");
          feedback.textContent = result.message;
        }
      } catch (err) {
        console.error("Error:", err);
      }
    });

    // Forgot Password Form Handler
    document.getElementById("forgotPasswordForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("resetEmail").value;

      try {
        const response = await fetch("http://localhost:5000/forgot-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email }),
        });

        const result = await response.json();

        const feedback = document.getElementById("feedback");
        feedback.style.display = "block";
        feedback.classList.remove("alert-success", "alert-danger");

        if (result.success) {
          feedback.classList.add("alert-success");
          feedback.textContent = result.message;

          // Hide the modal after a successful password reset request
          var myModal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
          myModal.hide();
        } else {
          feedback.classList.add("alert-danger");
          feedback.textContent = result.message;
        }
      } catch (err) {
        console.error("Error:", err);
      }
    });
  </script>
</body>
</html>
