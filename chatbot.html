<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JourneySync Chatbot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            color: white;
            margin: 0;
        }

        .chat-container {
            width: 90%;
            max-width: 450px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            padding: 12px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border-radius: 10px 10px 0 0;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            border-bottom: 2px solid #ddd;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .chat-box p {
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: #007bff;
            color: white;
            align-self: flex-end;
            text-align: right;
        }

        .bot-message {
            background: #ddd;
            color: black;
            align-self: flex-start;
            text-align: left;
        }

        .input-container {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 5px;
            background: white;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        .send-btn, .clear-btn {
            background: #007bff;
            border: none;
            color: white;
            font-size: 18px;
            padding: 8px 15px;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.3s ease;
        }

        .send-btn:hover, .clear-btn:hover {
            background: #0056b3;
            transform: scale(1.1);
        }

        .clear-btn {
            border-radius: 15px;
            padding: 8px 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">🚍 JourneySync Chatbot</div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)" />
            <button class="send-btn" onclick="sendMessage()">➤</button>
            <button class="clear-btn" onclick="clearChat()">🗑</button>
        </div>
    </div>

    <audio id="notification-sound" src="https://www.myinstants.com/media/sounds/pop.mp3"></audio>

    <script>
        function loadChatHistory() {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = localStorage.getItem("chatHistory") || "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const userInput = document.getElementById("user-input").value.trim();
            const chatBox = document.getElementById("chat-box");
            const notificationSound = document.getElementById("notification-sound");

            if (!userInput) return;

            const userMessage = `<p class='user-message'>${userInput}</p>`;
            chatBox.innerHTML += userMessage;
            chatBox.scrollTop = chatBox.scrollHeight;
            localStorage.setItem("chatHistory", chatBox.innerHTML);

            document.getElementById("user-input").value = "";

            setTimeout(async () => {
                try {
                    const response = await fetch("http://localhost:5001/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: userInput }),
                    });
                    const data = await response.json();
                    chatBox.innerHTML += `<p class='bot-message'>${data.reply}</p>`;
                } catch (error) {
                    chatBox.innerHTML += `<p class='bot-message'>⚠️ Bot is unavailable. <button onclick='sendMessage()'>Retry</button></p>`;
                }
                chatBox.scrollTop = chatBox.scrollHeight;
                localStorage.setItem("chatHistory", chatBox.innerHTML);
                notificationSound.play();
            }, 1000);
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        function clearChat() {
            document.getElementById("chat-box").innerHTML = "";
            localStorage.removeItem("chatHistory");
        }

        document.addEventListener("DOMContentLoaded", loadChatHistory);
    </script>
</body>
</html>
